<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retail Media Dashboard — CLIO</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --clio:#111111;--peripera:#FF4B6E;--goodal:#4CAF7D;
  --meta:#1877F2;--tiktok:#1ac;
  --bg:#F2F3F6;--surface:#fff;--header:#0F172A;
  --text:#111;--muted:#6B7280;--border:#E5E7EB;
  --radius:10px;--font:'Sora',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
.hdr{background:var(--header);color:#fff;padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:56px;gap:16px}
.hdr-brand{display:flex;align-items:center;gap:12px}
.hdr-logo{font-size:13px;font-weight:600;letter-spacing:.12em;color:#fff;opacity:.9}
.hdr-divider{width:1px;height:16px;background:rgba(255,255,255,.2)}
.hdr-title{font-size:13px;color:rgba(255,255,255,.55);font-weight:400}
.hdr-right{display:flex;align-items:center;gap:12px}
.sheets-form{display:flex;align-items:center;gap:8px}
.sheets-input{font-family:var(--font);font-size:12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;border-radius:6px;padding:6px 10px;width:280px;outline:none}
.sheets-input::placeholder{color:rgba(255,255,255,.3)}
.sheets-input:focus{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.12)}
.btn-load{font-family:var(--font);font-size:12px;font-weight:500;background:#fff;color:var(--header);border:none;border-radius:6px;padding:6px 14px;cursor:pointer;white-space:nowrap}
.btn-load:hover{background:#e2e8f0}
.status-dot{width:7px;height:7px;border-radius:50%;background:#374151}
.status-dot.ok{background:#4CAF7D}
.status-dot.err{background:#FF4B6E}
.status-label{font-size:11px;color:rgba(255,255,255,.4)}

/* FILTERS */
.filters{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;gap:20px;height:48px}
.filter-group{display:flex;align-items:center;gap:6px}
.filter-label{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.04em;margin-right:2px}
.pill{font-family:var(--font);font-size:12px;font-weight:500;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.pill:hover{border-color:#aaa;color:var(--text)}
.pill.active{color:#fff;border-color:transparent}
.pill[data-brand="all"].active,.pill[data-platform="all"].active{background:var(--text)}
.pill[data-brand="Clio"].active{background:var(--clio)}
.pill[data-brand="Peripera"].active{background:var(--peripera)}
.pill[data-brand="Goodal"].active{background:var(--goodal)}
.pill[data-platform="Meta"].active{background:var(--meta)}
.pill[data-platform="TikTok"].active{background:#222}
.filter-sep{width:1px;height:18px;background:var(--border)}
.last-updated{margin-left:auto;font-size:11px;color:var(--muted)}

/* MAIN */
main{padding:24px 28px;display:flex;flex-direction:column;gap:20px}

/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
.kpi-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:16px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent,#ddd);border-radius:3px 0 0 3px}
.kpi-label{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.04em;margin-bottom:8px}
.kpi-value{font-size:22px;font-weight:600;line-height:1;margin-bottom:4px;color:var(--text)}
.kpi-sub{font-size:11px;color:var(--muted)}
.kpi-up{color:#4CAF7D}
.kpi-down{color:#FF4B6E}

/* CHARTS GRID */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.chart-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:20px}
.card-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.card-sub{font-size:11px;color:var(--muted);margin-bottom:16px}
.chart-wrap{position:relative;width:100%;height:220px}

/* TABLE */
.table-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.table-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{padding:10px 14px;text-align:left;font-size:11px;font-weight:500;color:var(--muted);letter-spacing:.04em;border-bottom:1px solid var(--border);white-space:nowrap;background:#FAFAFA}
thead th.num{text-align:right}
tbody tr{border-bottom:1px solid var(--border)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#F9FAFB}
td{padding:10px 14px;color:var(--text);white-space:nowrap}
td.num{text-align:right;font-family:'DM Mono',monospace;font-size:11.5px}
.brand-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500}
.brand-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.platform-tag{font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;letter-spacing:.03em}
.platform-tag.meta{background:#EBF3FF;color:#1877F2}
.platform-tag.tiktok{background:#E8FAFA;color:#0891b2}

/* EMPTY STATE */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--muted)}
.empty-icon{font-size:32px;opacity:.4}
.empty-title{font-size:14px;font-weight:500;color:var(--text)}
.empty-sub{font-size:12px;text-align:center;max-width:320px;line-height:1.6}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--muted);font-size:13px}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* DEMO BANNER */
.demo-banner{background:#FFF8E1;border:1px solid #FFE082;border-radius:8px;padding:10px 16px;font-size:12px;color:#B45309;display:flex;align-items:center;gap:8px}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-brand">
    <span class="hdr-logo">CLIO</span>
    <div class="hdr-divider"></div>
    <span class="hdr-title">Retail Media Dashboard</span>
  </div>
  <div class="hdr-right">
    <div class="sheets-form">
      <input class="sheets-input" id="sheetsUrl" type="text" placeholder="Paste Google Sheets edit URL…" />
      <button class="btn-load" onclick="loadFromSheets()">Connect</button>
    </div>
    <div id="statusDot" class="status-dot"></div>
    <span id="statusLabel" class="status-label">not connected</span>
  </div>
</header>

<div class="filters">
  <div class="filter-group">
    <span class="filter-label">BRAND</span>
    <button class="pill active" data-brand="all" onclick="setFilter('brand','all',this)">All</button>
    <button class="pill" data-brand="Clio" onclick="setFilter('brand','Clio',this)">Clio</button>
    <button class="pill" data-brand="Peripera" onclick="setFilter('brand','Peripera',this)">Peripera</button>
    <button class="pill" data-brand="Goodal" onclick="setFilter('brand','Goodal',this)">Goodal</button>
  </div>
  <div class="filter-sep"></div>
  <div class="filter-group">
    <span class="filter-label">PLATFORM</span>
    <button class="pill active" data-platform="all" onclick="setFilter('platform','all',this)">All</button>
    <button class="pill" data-platform="Meta" onclick="setFilter('platform','Meta',this)">Meta</button>
    <button class="pill" data-platform="TikTok" onclick="setFilter('platform','TikTok',this)">TikTok</button>
  </div>
  <span class="last-updated" id="lastUpdated"></span>
</div>

<main>
  <div id="demoBanner" class="demo-banner" style="display:none">
    ⚠ Demo mode — showing sample data. Connect your Google Sheets above to see live data.
  </div>

  <div class="kpi-grid" id="kpiGrid">
    <div class="loading" style="grid-column:1/-1"><div class="spinner"></div> Loading…</div>
  </div>

  <div class="charts-row">
    <div class="chart-card">
      <div class="card-title">Spend by Brand × Platform</div>
      <div class="card-sub">Total spend (₩) breakdown</div>
      <div class="chart-wrap"><canvas id="spendChart" role="img" aria-label="Spend by brand and platform bar chart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="card-title">Daily Spend Trend</div>
      <div class="card-sub">Cumulative daily spend per brand</div>
      <div class="chart-wrap"><canvas id="trendChart" role="img" aria-label="Daily spend trend line chart"></canvas></div>
    </div>
  </div>

  <div class="table-card">
    <div class="table-header">
      <div>
        <div class="card-title">Campaign Performance</div>
        <div class="card-sub" id="tableCount" style="margin:0"></div>
      </div>
    </div>
    <div class="tbl-wrap">
      <div id="tableBody"></div>
    </div>
  </div>
</main>

<script>
const BRAND_COLORS = {Clio:'#111111',Peripera:'#FF4B6E',Goodal:'#4CAF7D'};
const PLATFORM_COLORS = {Meta:'#1877F2',TikTok:'#0891b2'};
const fmt = {
  krw: v => v == null || isNaN(v) ? '—' : '₩' + Math.round(v).toLocaleString(),
  pct: v => v == null || isNaN(v) ? '—' : (v * 100).toFixed(2) + '%',
  num: v => v == null || isNaN(v) ? '—' : Math.round(v).toLocaleString(),
  x:   v => v == null || isNaN(v) ? '—' : v.toFixed(2) + 'x',
};

let allData = [];
let filters = {brand:'all', platform:'all'};
let spendChartInst = null, trendChartInst = null;

// ── DEMO DATA ──────────────────────────────────────────────
function getDemoData() {
  const rows = [];
  const campaigns = [
    {brand:'Clio',    platform:'Meta',    camp:'Clio_META_Conv_W20',    obj:'Conversion'},
    {brand:'Clio',    platform:'Meta',    camp:'Clio_META_Conv_W21',    obj:'Conversion'},
    {brand:'Peripera',platform:'Meta',    camp:'Peripera_META_Traf_W20',obj:'Traffic'},
    {brand:'Peripera',platform:'Meta',    camp:'Peripera_META_Traf_W21',obj:'Traffic'},
    {brand:'Peripera',platform:'TikTok',  camp:'Peripera_TT_Traf_W20',  obj:'Traffic'},
    {brand:'Peripera',platform:'TikTok',  camp:'Peripera_TT_Traf_W21',  obj:'Traffic'},
    {brand:'Goodal',  platform:'Meta',    camp:'Goodal_META_Conv_W20',  obj:'Conversion'},
    {brand:'Goodal',  platform:'Meta',    camp:'Goodal_META_Conv_W21',  obj:'Conversion'},
    {brand:'Goodal',  platform:'TikTok',  camp:'Goodal_TT_Conv_W20',    obj:'Conversion'},
    {brand:'Goodal',  platform:'TikTok',  camp:'Goodal_TT_Conv_W21',    obj:'Conversion'},
  ];
  const dates = ['2026-05-11','2026-05-12','2026-05-13','2026-05-14','2026-05-18','2026-05-19','2026-05-20','2026-05-21'];
  campaigns.forEach(c => {
    dates.forEach(date => {
      const spend = Math.round((Math.random()*300000+150000));
      const imp   = Math.round(spend / (Math.random()*5+8));
      const clicks= Math.round(imp   * (Math.random()*.03+.02));
      const purch = Math.round(clicks* (Math.random()*.015+.005));
      const rev   = purch * (Math.random()*15000+8000);
      const vv    = c.platform === 'TikTok' ? Math.round(imp * (Math.random()*.3+.1)) : null;
      rows.push({date, brand:c.brand, platform:c.platform, campaign:c.camp, objective:c.obj, spend, impressions:imp, clicks, video_views:vv, purchases:purch, revenue:Math.round(rev)});
    });
  });
  return rows;
}

// ── GOOGLE SHEETS FETCH (JSONP — no CORS, works locally) ──
const LS_KEY = 'clio_dashboard_sheets_url';

function extractSheetId(input) {
  input = input.trim();
  // Edit URL: /spreadsheets/d/{ID}/edit
  const m = input.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]{20,})\/(?!e\/)/);
  if (m) return m[1];
  // Raw ID (not a 2PACX published ID)
  if (/^[a-zA-Z0-9-_]{20,}$/.test(input) && !input.startsWith('2PACX')) return input;
  return null;
}

function loadViaJsonp(sheetId) {
  return new Promise((resolve, reject) => {
    const cbName = '_gviz_' + Date.now();
    const timer = setTimeout(() => {
      delete window[cbName];
      document.getElementById(cbName)?.remove();
      reject(new Error('timeout'));
    }, 12000);

    window[cbName] = (resp) => {
      clearTimeout(timer);
      delete window[cbName];
      document.getElementById(cbName)?.remove();
      try {
        // Name-based mapping using MASTER header row
        const cols = resp.table.cols.map(c =>
          c.label.toLowerCase()
            .replace(/[\s(₩).]+/g,'_')
            .replace(/_+/g,'_')
            .replace(/^_|_$/g,'')
        );
        const rows = resp.table.rows.map(row => {
          const obj = {};
          row.c.forEach((cell, i) => {
            let v = cell ? cell.v : null;
            if (v instanceof Date) v = v.toISOString().slice(0,10);
            if (typeof v === 'string' && v.startsWith('Date(')) {
              const parts = v.slice(5,-1).split(',').map(Number);
              v = new Date(parts[0], parts[1], parts[2]).toISOString().slice(0,10);
            }
            obj[cols[i]] = v;
          });
          return obj;
        }).filter(r => r.brand && (r.spend || r.impr));
        resolve(rows);
      } catch(e) { reject(e); }
    };

    const script = document.createElement('script');
    script.id = cbName;
    script.src = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json;responseHandler:${cbName}&sheet=MASTER&headers=1`;
    script.onerror = () => { clearTimeout(timer); reject(new Error('load_failed')); };
    document.head.appendChild(script);
  });
}

async function loadFromSheets() {
  const raw = document.getElementById('sheetsUrl').value.trim();
  const id  = extractSheetId(raw);
  if (!id) {
    setStatus('err', 'Paste the edit URL — e.g. docs.google.com/spreadsheets/d/{ID}/edit');
    return;
  }

  setStatus('', 'connecting…');
  try {
    const rows = await loadViaJsonp(id);
    if (!rows.length) throw new Error('empty');

    // Sheets data already has correct flat keys — pass null colMap
    allData = rows.map(r => normalizeRow(r, null)).filter(r => r.brand && r.spend > 0);

    localStorage.setItem(LS_KEY, raw);
    document.getElementById('demoBanner').style.display = 'none';
    setStatus('ok', `${allData.length} rows · auto-saved`);
    document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();
    render();
  } catch(e) {
    if (e.message === 'empty') {
      setStatus('err', 'MASTER tab is empty — add data rows first');
    } else if (e.message === 'load_failed') {
      setStatus('err', 'Could not load — set sharing to "Anyone with link can view"');
    } else if (e.message === 'timeout') {
      setStatus('err', 'Timed out — check sheet sharing settings');
    } else {
      setStatus('err', 'Error — see console for details');
    }
    console.error(e);
  }
}

function buildColMap(cols) {
  // kept for demo data compatibility
  const find = (...keys) => { for(const k of keys){ const i = cols.findIndex(c=>c.includes(k)); if(i>-1)return cols[i]; } return null; };
  return {
    date:       find('date'),
    brand:      find('brand'),
    platform:   find('platform'),
    campaign:   find('campaign','camp'),
    objective:  find('objective','obj'),
    spend:      find('spend'),
    impressions:find('impr','impression'),
    clicks:     find('click'),
    video_views:find('vid','view'),
    purchases:  find('purch','purchase'),
    revenue:    find('revenue','rev'),
  };
}

function normalizeRow(r, m) {
  // Handles both Sheets data (r has flat keys) and demo data (r has named keys via colMap)
  const get = (sheetKey, demoKey) => {
    if (r[sheetKey] !== undefined && r[sheetKey] !== null) return r[sheetKey];
    if (m && m[demoKey] && r[m[demoKey]] !== undefined) return r[m[demoKey]];
    return null;
  };

  const spend = +get('spend','spend') || 0;
  const imp   = +get('impr','impressions') || 0;
  const clk   = +get('clicks','clicks') || 0;
  const vv    = +get('views','video_views') || null;
  const purch = +get('purchases','purchases') || 0;
  const rev   = +get('revenue','revenue') || 0;

  const dateRaw = get('date','date');
  const date = dateRaw instanceof Date
    ? dateRaw.toISOString().slice(0,10)
    : (dateRaw||'').toString().slice(0,10);
  const platform = (get('platform','platform')||'').toString().trim() || (vv > 0 ? 'TikTok' : 'Meta');

  // Use pre-calculated metrics from MASTER if available, else compute
  const toNum = v => { const n = +v; return isNaN(n) ? null : n; };
  const ctr  = toNum(get('ctr','ctr'))   ?? (imp   ? clk/imp        : null);
  const cpm  = toNum(get('cpm','cpm'))   ?? (imp   ? spend/imp*1000 : null);
  const cpc  = toNum(get('cpc','cpc'))   ?? (clk   ? spend/clk      : null);
  const cvr  = toNum(get('cvr','cvr'))   ?? (clk   ? purch/clk      : null);
  const cpa  = toNum(get('cpa','cpa'))   ?? (purch ? spend/purch     : null);
  const roas = toNum(get('roas','roas')) ?? (spend ? rev/spend       : null);
  const vtr  = toNum(get('vtr','vtr'))   ?? ((vv&&imp) ? vv/imp      : null);

  return {
    date, platform,
    brand:     (get('brand','brand')||'').toString().trim(),
    campaign:  (get('campaign','campaign')||'').toString().trim(),
    objective: (get('objective','objective')||'').toString().trim(),
    spend, impressions:imp, clicks:clk, video_views:vv||null, purchases:purch, revenue:rev,
    ctr, cpm, cpc, cvr, cpa, roas, vtr,
  };
}

// ── FILTERS ───────────────────────────────────────────────
function setFilter(type, val, el) {
  filters[type] = val;
  document.querySelectorAll(`.pill[data-${type}]`).forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  render();
}

function getFiltered() {
  return allData.filter(r => {
    if (filters.brand !== 'all' && r.brand !== filters.brand) return false;
    if (filters.platform !== 'all' && r.platform !== filters.platform) return false;
    return true;
  });
}

// ── RENDER ────────────────────────────────────────────────
function render() {
  const data = getFiltered();
  renderKPIs(data);
  renderSpendChart(data);
  renderTrendChart(data);
  renderTable(data);
}

function aggregate(data) {
  const spend = data.reduce((s,r)=>s+r.spend,0);
  const imp   = data.reduce((s,r)=>s+r.impressions,0);
  const clk   = data.reduce((s,r)=>s+r.clicks,0);
  const purch = data.reduce((s,r)=>s+r.purchases,0);
  const rev   = data.reduce((s,r)=>s+r.revenue,0);
  return {
    spend, imp, clk, purch, rev,
    ctr:  imp  ? clk/imp  : null,
    cpm:  imp  ? spend/imp*1000 : null,
    cpc:  clk  ? spend/clk : null,
    roas: spend? rev/spend : null,
    cpa:  purch? spend/purch : null,
  };
}

function renderKPIs(data) {
  const a = aggregate(data);
  const grid = document.getElementById('kpiGrid');
  const cards = [
    {label:'TOTAL SPEND',  value:fmt.krw(a.spend),    sub:`${data.length} campaigns`,    accent:'#6366F1'},
    {label:'IMPRESSIONS',  value:fmt.num(a.imp),       sub:'Total reach',                 accent:'#8B5CF6'},
    {label:'CLICKS',       value:fmt.num(a.clk),       sub:`CTR ${fmt.pct(a.ctr)}`,       accent:'#06B6D4'},
    {label:'PURCHASES',    value:fmt.num(a.purch),     sub:`CVR ${fmt.pct(a.clk?a.purch/a.clk:null)}`, accent:'#4CAF7D'},
    {label:'ROAS',         value:fmt.x(a.roas),        sub:`Rev ${fmt.krw(a.rev)}`,       accent:'#F59E0B'},
    {label:'CPA',          value:fmt.krw(a.cpa),       sub:`CPM ${fmt.krw(a.cpm)}`,       accent:'#EF4444'},
  ];
  grid.innerHTML = cards.map(c => `
    <div class="kpi-card" style="--accent:${c.accent}">
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-value">${c.value}</div>
      <div class="kpi-sub">${c.sub}</div>
    </div>`).join('');
}

function renderSpendChart(data) {
  const brands = [...new Set(data.map(r=>r.brand))].sort();
  const platforms = [...new Set(data.map(r=>r.platform))];
  const datasets = platforms.map(p => ({
    label: p,
    data: brands.map(b => data.filter(r=>r.brand===b&&r.platform===p).reduce((s,r)=>s+r.spend,0)),
    backgroundColor: p === 'Meta' ? '#1877F2' : '#0891b2',
    borderRadius: 4, borderSkipped: false,
  }));
  if (spendChartInst) spendChartInst.destroy();
  const ctx = document.getElementById('spendChart');
  spendChartInst = new Chart(ctx, {
    type:'bar',
    data:{labels:brands, datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{grid:{display:false}, ticks:{font:{family:'Sora',size:11}}},
        y:{grid:{color:'#F3F4F6'}, ticks:{font:{family:'DM Mono',size:10}, callback:v=>'₩'+Math.round(v/1000000)+'M'}},
      },
    }
  });
  // custom legend
  const legendEl = ctx.closest('.chart-card').querySelector('.card-sub');
  legendEl.innerHTML = platforms.map(p=>`
    <span style="display:inline-flex;align-items:center;gap:4px;margin-right:12px;font-size:11px;color:#6B7280">
      <span style="width:10px;height:10px;border-radius:2px;background:${PLATFORM_COLORS[p]||'#aaa'};display:inline-block"></span>${p}
    </span>`).join('');
}

function renderTrendChart(data) {
  const dates  = [...new Set(data.map(r=>r.date))].sort();
  const brands = [...new Set(data.map(r=>r.brand))].sort();
  const brandColors = {Clio:'#111111',Peripera:'#FF4B6E',Goodal:'#4CAF7D'};
  const datasets = brands.map(b => ({
    label: b,
    data: dates.map(d => data.filter(r=>r.brand===b&&r.date===d).reduce((s,r)=>s+r.spend,0)),
    borderColor: brandColors[b] || '#aaa',
    backgroundColor: 'transparent',
    borderWidth: 2, pointRadius: 3,
    pointBackgroundColor: brandColors[b] || '#aaa',
    tension: 0.3,
  }));
  if (trendChartInst) trendChartInst.destroy();
  const ctx = document.getElementById('trendChart');
  trendChartInst = new Chart(ctx, {
    type:'line',
    data:{labels:dates.map(d=>d.slice(5)), datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{grid:{display:false}, ticks:{font:{family:'DM Mono',size:10}}},
        y:{grid:{color:'#F3F4F6'}, ticks:{font:{family:'DM Mono',size:10}, callback:v=>'₩'+Math.round(v/1000000)+'M'}},
      },
    }
  });
  const legendEl = ctx.closest('.chart-card').querySelector('.card-sub');
  legendEl.innerHTML = brands.map(b=>`
    <span style="display:inline-flex;align-items:center;gap:4px;margin-right:12px;font-size:11px;color:#6B7280">
      <span style="width:10px;height:10px;border-radius:50%;background:${brandColors[b]||'#aaa'};display:inline-block"></span>${b}
    </span>`).join('');
}

function renderTable(data) {
  document.getElementById('tableCount').textContent = `${data.length} rows`;
  if (!data.length) {
    document.getElementById('tableBody').innerHTML = `<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">No data</div><div class="empty-sub">Try adjusting your filters or connect a Google Sheet.</div></div>`;
    return;
  }
  // Aggregate by campaign+brand+platform
  const agg = {};
  data.forEach(r => {
    const key = `${r.campaign}||${r.brand}||${r.platform}`;
    if (!agg[key]) agg[key] = {campaign:r.campaign,brand:r.brand,platform:r.platform,objective:r.objective,spend:0,impressions:0,clicks:0,video_views:0,purchases:0,revenue:0};
    const a = agg[key];
    a.spend+=r.spend; a.impressions+=r.impressions; a.clicks+=r.clicks;
    a.video_views+=r.video_views||0; a.purchases+=r.purchases; a.revenue+=r.revenue;
  });
  const rows = Object.values(agg).sort((a,b)=>b.spend-a.spend).map(a => ({
    ...a,
    ctr:  a.impressions ? a.clicks/a.impressions : null,
    cpc:  a.clicks ? a.spend/a.clicks : null,
    cpa:  a.purchases ? a.spend/a.purchases : null,
    roas: a.spend ? a.revenue/a.spend : null,
  }));

  const brandDot = b => `<span class="brand-badge"><span class="brand-dot" style="background:${BRAND_COLORS[b]||'#aaa'}"></span>${b}</span>`;
  const platTag  = p => `<span class="platform-tag ${p.toLowerCase()}">${p}</span>`;

  document.getElementById('tableBody').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Brand</th><th>Platform</th><th>Campaign</th><th>Objective</th>
          <th class="num">Spend</th><th class="num">Impressions</th><th class="num">Clicks</th>
          <th class="num">CTR</th><th class="num">CPC</th>
          <th class="num">Purchases</th><th class="num">CPA</th><th class="num">ROAS</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(r=>`<tr>
          <td>${brandDot(r.brand)}</td>
          <td>${platTag(r.platform)}</td>
          <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;font-size:11.5px;color:#374151">${r.campaign}</td>
          <td style="font-size:11px;color:#6B7280">${r.objective}</td>
          <td class="num">${fmt.krw(r.spend)}</td>
          <td class="num">${fmt.num(r.impressions)}</td>
          <td class="num">${fmt.num(r.clicks)}</td>
          <td class="num">${fmt.pct(r.ctr)}</td>
          <td class="num">${fmt.krw(r.cpc)}</td>
          <td class="num">${fmt.num(r.purchases)}</td>
          <td class="num">${fmt.krw(r.cpa)}</td>
          <td class="num">${fmt.x(r.roas)}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

function setStatus(type, msg) {
  const dot = document.getElementById('statusDot');
  const lbl = document.getElementById('statusLabel');
  dot.className = 'status-dot' + (type ? ' ' + type : '');
  lbl.textContent = msg;
}

// ── INIT ──────────────────────────────────────────────────
(function init() {
  // Always render demo first so page isn't blank
  allData = getDemoData().map(r => ({
    ...r,
    ctr:  r.impressions ? r.clicks/r.impressions : null,
    cpm:  r.impressions ? r.spend/r.impressions*1000 : null,
    cpc:  r.clicks ? r.spend/r.clicks : null,
    cvr:  r.clicks ? r.purchases/r.clicks : null,
    cpa:  r.purchases ? r.spend/r.purchases : null,
    roas: r.spend ? r.revenue/r.spend : null,
    vtr:  (r.video_views && r.impressions) ? r.video_views/r.impressions : null,
  }));
  document.getElementById('demoBanner').style.display = 'flex';
  document.getElementById('lastUpdated').textContent = 'Demo data';
  render();

  // Auto-connect if a URL was saved previously
  const saved = localStorage.getItem(LS_KEY);
  if (saved) {
    document.getElementById('sheetsUrl').value = saved;
    setStatus('', 'reconnecting…');
    loadFromSheets();
  }
})();

document.getElementById('sheetsUrl').addEventListener('keydown', e => { if(e.key==='Enter') loadFromSheets(); });
</script>
